<!DOCTYPE html>
<head>
    <meta charset="UTF-8">
    <title>바람이 불어 오는 곳곳</title>
</head>
<body>
    <h1>시의 예</h1>
    <pre>
        <b>바람이</b> 불어오는 곳
        그곳에 내 <Strong>마음</Strong>이 머무네

        <b>바람</b>이 그치는 곳
        그곳에 내 <strong>꿈</strong>이 쉬어가네
    </pre>
    
</body>
</html>
